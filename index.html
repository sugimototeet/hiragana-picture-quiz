<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>えらんでクイズ</title>
    <style>
:root {
  --sky: #6ec7e8;
  --sun: #ffe23d;
  --ink: #1f3455;
  --red: #ef3b4d;
  --green: #24bd73;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
  margin: 0;
}

body {
  overflow: hidden;
  color: var(--ink);
  background:
    radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.52) 0 11px, transparent 12px),
    radial-gradient(circle at 83% 22%, rgba(255, 226, 61, 0.86) 0 16px, transparent 17px),
    linear-gradient(180deg, #72cbed 0%, #4ab0da 100%);
  font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif;
  touch-action: manipulation;
  user-select: none;
}

button,
select,
input {
  font: inherit;
}

.app {
  position: relative;
  display: grid;
  grid-template-columns: minmax(280px, 35vw) minmax(0, 1fr);
  grid-template-rows: minmax(70px, 12dvh) minmax(0, 1fr);
  gap: clamp(8px, 1.4vw, 18px);
  width: 100vw;
  height: 100dvh;
  padding: max(14px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
}

.app::before {
  position: absolute;
  inset: 0;
  z-index: -1;
  background-image:
    repeating-linear-gradient(-12deg, transparent 0 72px, rgba(255, 226, 61, 0.72) 73px 82px, transparent 83px 148px),
    repeating-linear-gradient(18deg, transparent 0 92px, rgba(255, 255, 255, 0.42) 93px 102px, transparent 103px 184px);
  content: "";
  opacity: 0.55;
}

.topbar {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 72px minmax(0, 1fr);
  align-items: start;
}

.brand {
  justify-self: end;
  color: var(--sun);
  font-weight: 900;
  text-align: center;
  text-shadow: 0 4px 0 rgba(21, 94, 138, 0.42);
}

.brand span,
.brand strong {
  display: block;
  line-height: 0.92;
}

.brand span {
  font-size: clamp(17px, 2.3vw, 28px);
}

.brand strong {
  font-size: clamp(25px, 3.4vw, 44px);
}

.icon-button {
  display: grid;
  place-items: center;
  width: 64px;
  height: 64px;
  border: 5px solid var(--ink);
  border-radius: 8px;
  color: var(--ink);
  background: var(--sun);
  box-shadow: 0 8px 0 rgba(31, 52, 85, 0.24);
  font-size: 30px;
  font-weight: 900;
}

.icon-button:active {
  transform: translateY(5px);
  box-shadow: 0 3px 0 rgba(31, 52, 85, 0.2);
}

.icon-button.small {
  width: 48px;
  height: 48px;
  border-width: 4px;
  font-size: 26px;
}

.question {
  grid-column: 1;
  grid-row: 2;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  align-items: center;
  justify-items: center;
  min-height: 0;
  padding: 2vh 1vw;
}

.question-label {
  color: #ffffff;
  font-size: clamp(28px, 4vw, 56px);
  font-weight: 900;
  text-shadow: 0 5px 0 rgba(31, 52, 85, 0.26);
}

.question-word {
  display: grid;
  place-items: center;
  width: 100%;
  color: var(--ink);
  font-size: min(clamp(66px, 11vw, 154px), calc(29vw / var(--letters, 2)));
  font-weight: 900;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
  text-shadow: 0 5px 0 rgba(255, 255, 255, 0.52);
}

.message {
  min-height: 1.2em;
  color: var(--sun);
  font-size: clamp(26px, 4vw, 48px);
  font-weight: 900;
  text-align: center;
  text-shadow: 0 4px 0 rgba(31, 52, 85, 0.28);
}

.choices {
  grid-column: 2;
  grid-row: 2;
  display: grid;
  align-self: stretch;
  gap: clamp(10px, 1.5vw, 20px);
  min-width: 0;
  min-height: 0;
}

.choices.count-3 {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.choices.count-4 {
  grid-template-columns: repeat(2, minmax(0, 1fr));
  grid-template-rows: repeat(2, minmax(0, 1fr));
}

.choices.count-5 {
  grid-template-columns: repeat(3, minmax(0, 1fr));
  grid-template-rows: repeat(2, minmax(0, 1fr));
}

.choice {
  display: grid;
  place-items: center;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  border: 7px solid var(--ink);
  border-radius: 8px;
  background: #ffffff;
  box-shadow: 0 10px 0 rgba(31, 52, 85, 0.24);
  padding: clamp(4px, 0.8vw, 10px);
}

.choice img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
}

.choice:active:not(:disabled) {
  transform: translateY(6px);
  box-shadow: 0 4px 0 rgba(31, 52, 85, 0.22);
}

.choice.correct {
  border-color: var(--green);
  outline: 8px solid var(--green);
  outline-offset: -15px;
  animation: correctPop 620ms ease;
}

.choice.wrong {
  border-color: var(--red);
  background: #ffdfe3;
  outline: 10px solid var(--red);
  outline-offset: -17px;
  animation: wrongShake 560ms ease;
}

.choices.locked .choice {
  cursor: not-allowed;
}

.choices.locked .choice:not(.wrong) {
  opacity: 0.58;
  filter: saturate(0.65);
}

.reaction {
  pointer-events: none;
  position: fixed;
  inset: 0;
  z-index: 10;
  display: grid;
  place-items: center;
  opacity: 0;
  transform: scale(0.9);
  transition: opacity 170ms ease, transform 170ms ease;
}

.reaction.show {
  opacity: 1;
  transform: scale(1.04);
}

.reaction.wrong {
  background: rgba(239, 59, 77, 0.2);
}

.reaction.correct {
  background: rgba(255, 226, 61, 0.12);
}

.reaction-label {
  position: absolute;
  top: max(12vh, 80px);
  left: 50%;
  padding: 12px 26px;
  border: 6px solid var(--ink);
  border-radius: 8px;
  color: var(--ink);
  background: var(--sun);
  box-shadow: 0 9px 0 rgba(31, 52, 85, 0.24);
  font-size: clamp(44px, 7vw, 90px);
  font-weight: 900;
  transform: translateX(-50%) rotate(-3deg);
}

.reaction.wrong .reaction-label {
  color: #ffffff;
  background: var(--red);
}

.reaction img {
  display: block;
  width: min(52vh, 52vw, 500px);
  max-width: 72vw;
  max-height: 55vh;
  object-fit: contain;
  filter: drop-shadow(0 18px 0 rgba(20, 82, 124, 0.2));
}

.settings {
  width: min(560px, calc(100vw - 28px));
  border: 6px solid var(--ink);
  border-radius: 8px;
  color: var(--ink);
  background: #fffaf0;
  box-shadow: 0 18px 0 rgba(31, 52, 85, 0.22);
}

.settings::backdrop {
  background: rgba(31, 52, 85, 0.42);
}

.settings-inner {
  display: grid;
  gap: 16px;
  margin: 0;
}

.settings-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.settings h2 {
  margin: 0;
  font-size: 28px;
}

.setting-row {
  display: grid;
  grid-template-columns: 130px minmax(0, 1fr);
  align-items: center;
  gap: 12px;
  font-size: 20px;
  font-weight: 800;
}

.setting-row input,
.setting-row select {
  min-height: 50px;
  max-width: 100%;
  border: 4px solid var(--ink);
  border-radius: 8px;
  background: #ffffff;
  padding: 6px 10px;
}

.settings-note {
  margin: 4px 0 0;
  font-size: 16px;
  line-height: 1.5;
}

.confetti-piece {
  pointer-events: none;
  position: fixed;
  z-index: 12;
  top: -30px;
  left: var(--x);
  width: 18px;
  height: 24px;
  border-radius: 3px;
  background: var(--sun);
  animation: confettiFall 1400ms ease-out var(--delay) forwards;
}

.confetti-piece:nth-of-type(3n) {
  background: #ffffff;
}

.confetti-piece:nth-of-type(3n + 1) {
  background: var(--red);
}

@keyframes correctPop {
  0%,
  100% {
    transform: scale(1);
  }
  45% {
    transform: scale(1.05);
  }
}

@keyframes wrongShake {
  0%,
  100% {
    transform: translateX(0);
  }
  25% {
    transform: translateX(-14px) rotate(-2deg);
  }
  55% {
    transform: translateX(14px) rotate(2deg);
  }
}

@keyframes confettiFall {
  0% {
    opacity: 1;
    transform: translateY(0) rotate(0deg);
  }
  100% {
    opacity: 0;
    transform: translateY(105vh) rotate(var(--spin));
  }
}

@media (orientation: portrait) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(66px, 9dvh) minmax(140px, 24dvh) minmax(0, 1fr);
  }

  .question {
    grid-column: 1;
    grid-row: 2;
    grid-template-columns: auto minmax(0, 1fr);
    grid-template-rows: minmax(0, 1fr) auto;
    gap: 8px;
    padding: 0 3vw;
  }

  .question-label {
    font-size: clamp(24px, 6vw, 42px);
  }

  .question-word {
    font-size: min(clamp(58px, 15vw, 112px), calc(72vw / var(--letters, 2)));
  }

  .message {
    grid-column: 1 / -1;
  }

  .choices {
    grid-column: 1;
    grid-row: 3;
  }

  .choices.count-3 {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 620px) {
  .topbar {
    grid-template-columns: 58px minmax(0, 1fr);
  }

  .icon-button {
    width: 54px;
    height: 54px;
    font-size: 25px;
  }

  .setting-row {
    grid-template-columns: 1fr;
  }
}

    </style>
  </head>
  <body>
    <main class="app" aria-live="polite">
      <div class="reaction" id="reaction" aria-hidden="true">
        <div class="reaction-label" id="reactionLabel">やったね！</div>
        <img id="reactionImage" alt="">
      </div>

      <header class="topbar">
        <button class="icon-button" id="settingsButton" type="button" aria-label="設定">⚙</button>
        <div class="brand" aria-label="えらんでクイズ">
          <span>ひらがな</span>
          <strong>えらんでクイズ</strong>
        </div>
      </header>

      <section class="question" aria-label="もんだい">
        <div class="question-label">どの えかな？</div>
        <div class="question-word" id="questionWord">あり</div>
        <div class="message" id="messageText">おしてね</div>
      </section>

      <section class="choices" id="choices" aria-label="えのこたえ"></section>
    </main>

    <dialog class="settings" id="settingsDialog">
      <form method="dialog" class="settings-inner">
        <div class="settings-head">
          <h2>おやこ設定</h2>
          <button class="icon-button small" value="close" aria-label="閉じる">×</button>
        </div>

        <label class="setting-row">
          <span>キャラ画像</span>
          <input id="imageInput" type="file" accept="image/*">
        </label>

        <label class="setting-row">
          <span>もんだい</span>
          <select id="groupSelect">
            <option value="all">ぜんぶ</option>
            <option value="a">あいうえお</option>
            <option value="ka">かきくけこ</option>
            <option value="sa">さしすせそ</option>
            <option value="ta">たちつてと</option>
            <option value="na">なにぬねの</option>
            <option value="ha">はひふへほ</option>
            <option value="ma">まみむめも</option>
            <option value="ya">やゆよ</option>
            <option value="ra">らりるれろ</option>
            <option value="wa">わ</option>
          </select>
        </label>

        <label class="setting-row">
          <span>えらぶ数</span>
          <select id="choiceCountSelect">
            <option value="3">3つ</option>
            <option value="4">4つ</option>
            <option value="5">5つ</option>
          </select>
        </label>

        <p class="settings-note">まちがえると、3びょうかん おやすみです。</p>
      </form>
    </dialog>

for (const clue of Object.values(CLUES)) {
  clue.image = `${clue.image}?v=1`;
}

const QUIZ_KANA = GROUPS.all.filter((kana) => CLUES[kana]?.image);

const els = {
  settingsButton: document.querySelector("#settingsButton"),
  settingsDialog: document.querySelector("#settingsDialog"),
  imageInput: document.querySelector("#imageInput"),
  groupSelect: document.querySelector("#groupSelect"),
  choiceCountSelect: document.querySelector("#choiceCountSelect"),
  questionWord: document.querySelector("#questionWord"),
  messageText: document.querySelector("#messageText"),
  choices: document.querySelector("#choices"),
  reaction: document.querySelector("#reaction"),
  reactionLabel: document.querySelector("#reactionLabel"),
  reactionImage: document.querySelector("#reactionImage")
};

const state = {
  target: "あ",
  options: [],
  locked: false,
  lastTarget: "",
  firstRound: true,
  penaltyTimer: null,
  settings: {
    group: localStorage.getItem("picture-quiz-group") || "all",
    choiceCount: Number(localStorage.getItem("picture-quiz-choice-count") || "3")
  }
};

const missingAudio = new Set();

init();

function init() {
  if (!GROUPS[state.settings.group]) state.settings.group = "all";
  if (![3, 4, 5].includes(state.settings.choiceCount)) state.settings.choiceCount = 3;

  els.groupSelect.value = state.settings.group;
  els.choiceCountSelect.value = String(state.settings.choiceCount);
  loadCharacter();
  bindEvents();
  nextRound();
}

function bindEvents() {
  els.settingsButton.addEventListener("click", () => els.settingsDialog.showModal());

  els.groupSelect.addEventListener("change", () => {
    state.settings.group = els.groupSelect.value;
    localStorage.setItem("picture-quiz-group", state.settings.group);
    clearPenalty();
    nextRound();
  });

  els.choiceCountSelect.addEventListener("change", () => {
    state.settings.choiceCount = Number(els.choiceCountSelect.value);
    localStorage.setItem("picture-quiz-choice-count", String(state.settings.choiceCount));
    clearPenalty();
    nextRound();
  });

  els.imageInput.addEventListener("change", async () => {
    const file = els.imageInput.files?.[0];
    if (!file) return;
    const dataUrl = await readFileAsDataUrl(file);
    localStorage.setItem("hiragana-character-image", dataUrl);
    setCharacter(dataUrl);
  });
}

function loadCharacter() {
  const savedImage = localStorage.getItem("hiragana-character-image");
  if (savedImage) {
    setCharacter(savedImage);
    return;
  }

  tryCharacterCandidate(["./assets/sunsun.png", "./assets/character.png"], 0);
}

function tryCharacterCandidate(candidates, index) {
  if (index >= candidates.length) return;
  const image = new Image();
  image.onload = () => setCharacter(candidates[index]);
  image.onerror = () => tryCharacterCandidate(candidates, index + 1);
  image.src = candidates[index];
}

function setCharacter(src) {
  els.reactionImage.src = src;
}

function nextRound() {
  clearPenalty();
  state.locked = false;
  const pool = getPool();
  state.target = state.firstRound && pool.includes("あ") ? "あ" : randomFrom(pool);
  state.firstRound = false;

  if (pool.length > 1 && state.target === state.lastTarget) {
    state.target = pool.find((kana) => kana !== state.lastTarget) || state.target;
  }

  state.lastTarget = state.target;
  state.options = makeOptions(state.target, pool);
  els.questionWord.textContent = CLUES[state.target].word;
  els.questionWord.style.setProperty("--letters", String(CLUES[state.target].word.length));
  els.messageText.textContent = "おしてね";
  hideReaction();
  renderChoices();
}

function getPool() {
  const selected = state.settings.group === "all"
    ? QUIZ_KANA
    : GROUPS[state.settings.group] || QUIZ_KANA;
  const available = selected.filter((kana) => QUIZ_KANA.includes(kana));
  return available.length >= state.settings.choiceCount ? available : QUIZ_KANA;
}

function makeOptions(target, pool) {
  const options = [target];
  const candidates = shuffle(
    [...new Set([...pool, ...QUIZ_KANA])].filter((kana) => kana !== target)
  );

  while (options.length < state.settings.choiceCount && candidates.length) {
    options.push(candidates.pop());
  }

  return shuffle(options);
}

function renderChoices() {
  els.choices.className = `choices count-${state.options.length}`;
  els.choices.innerHTML = "";

  state.options.forEach((kana, index) => {
    const clue = CLUES[kana];
    const button = document.createElement("button");
    button.type = "button";
    button.className = "choice";
    button.dataset.kana = kana;
    button.setAttribute("aria-label", `え ${index + 1}`);

    const image = document.createElement("img");
    image.src = clue.image;
    image.alt = "";
    image.draggable = false;

    button.append(image);
    button.addEventListener("click", () => answer(kana, button));
    els.choices.append(button);
  });
}

async function answer(kana, button) {
  if (state.locked) return;

  if (kana === state.target) {
    state.locked = true;
    setChoicesDisabled(true);
    button.classList.add("correct");
    els.messageText.textContent = "やったね！";
    showReaction("やったね！", "correct");
    celebrate();
    await playFeedback("correct");
    setTimeout(nextRound, 1200);
    return;
  }

  state.locked = true;
  setChoicesDisabled(true);
  button.classList.add("wrong");
  els.choices.classList.add("locked");
  els.messageText.textContent = "ちがうよ";
  showReaction("ちがうよ", "wrong");
  void playFeedback("try");

  state.penaltyTimer = setTimeout(() => {
    button.classList.remove("wrong");
    els.choices.classList.remove("locked");
    setChoicesDisabled(false);
    els.messageText.textContent = "もういちど";
    hideReaction();
    state.locked = false;
    state.penaltyTimer = null;
  }, 3000);
}

function showReaction(label, type) {
  els.reactionLabel.textContent = label;
  els.reaction.className = `reaction show ${type}`;
  els.reactionImage.hidden = !els.reactionImage.getAttribute("src");
}

function hideReaction() {
  els.reaction.className = "reaction";
}

function clearPenalty() {
  if (state.penaltyTimer) {
    clearTimeout(state.penaltyTimer);
    state.penaltyTimer = null;
  }
  els.choices?.classList.remove("locked");
  setChoicesDisabled(false);
}

function setChoicesDisabled(disabled) {
  els.choices?.querySelectorAll(".choice").forEach((button) => {
    button.disabled = disabled;
  });
}

async function playFeedback(type) {
  const base = type === "correct" ? "./audio/correct" : "./audio/try-again";
  const ok = await tryPlayAudio(`${base}.wav`) || await tryPlayAudio(`${base}.mp3`);
  if (!ok) speakWithBrowser(type === "correct" ? "やったね" : "ちがうよ");
}

function tryPlayAudio(src) {
  if (missingAudio.has(src)) return Promise.resolve(false);

  return new Promise((resolve) => {
    let settled = false;
    const audio = new Audio(src);
    audio.preload = "auto";
    audio.addEventListener("canplaythrough", () => {
      if (settled) return;
      settled = true;
      audio.play().then(() => resolve(true)).catch(() => resolve(false));
    }, { once: true });
    audio.addEventListener("error", () => {
      if (settled) return;
      settled = true;
      missingAudio.add(src);
      resolve(false);
    }, { once: true });
    audio.load();
    setTimeout(() => {
      if (settled) return;
      settled = true;
      missingAudio.add(src);
      resolve(false);
    }, 350);
  });
}

function speakWithBrowser(text) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "ja-JP";
  utterance.rate = 0.78;
  utterance.pitch = 1.08;
  window.speechSynthesis.speak(utterance);
}

function celebrate() {
  for (let i = 0; i < 42; i += 1) {
    const piece = document.createElement("span");
    piece.className = "confetti-piece";
    piece.style.setProperty("--x", `${Math.random() * 100}vw`);
    piece.style.setProperty("--delay", `${Math.random() * 180}ms`);
    piece.style.setProperty("--spin", `${180 + Math.random() * 420}deg`);
    document.body.append(piece);
    setTimeout(() => piece.remove(), 1500);
  }
}

function randomFrom(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function shuffle(items) {
  const result = [...items];
  for (let i = result.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
